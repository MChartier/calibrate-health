services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fitness_app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/fitness_app?schema=public
      PORT: 3000
      SESSION_SECRET: development_secret_key
      AUTO_LOGIN_TEST_USER: "false"
      SESSION_COOKIE_SECURE: "false"
      NODE_ENV: development
      WEB_PUSH_PUBLIC_KEY: ${WEB_PUSH_PUBLIC_KEY:-}
      WEB_PUSH_PRIVATE_KEY: ${WEB_PUSH_PRIVATE_KEY:-}
      WEB_PUSH_SUBJECT: ${WEB_PUSH_SUBJECT:-}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - app-network
    command: sh -c "npm run db:migrate && npm run db:seed && npm run dev"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      EXPO_PUBLIC_CALIBRATE_SERVER_URL: http://localhost:3000
      EXPO_WEB_DEV_SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      - backend
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - app-network
    command: sh -c "npm ci --no-audit --fund=false && npm run dev:expo-web"

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
