services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:4-24-bookworm
    volumes:
      - ..:/workspaces/${WORKSPACE_FOLDER_NAME}:cached
      - workspace_node_modules:/workspaces/${WORKSPACE_FOLDER_NAME}/node_modules
      - backend_node_modules:/workspaces/${WORKSPACE_FOLDER_NAME}/backend/node_modules
      - ${GIT_DIR}:/workspaces/.git-dir:cached
      - ${GIT_COMMON_DIR}:/workspaces/.git-common:cached
      - npm_cache:/home/node/.npm
    ports:
      - "${BACKEND_PORT}:3000"
      - "${EXPO_WEB_PORT}:${EXPO_WEB_PORT}"
    command: sleep infinity
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/fitness_app?schema=public
      FOOD_DATA_PROVIDER: ${FOOD_DATA_PROVIDER}
      PORT: 3000
      SESSION_SECRET: development_secret_key
      FATSECRET_CLIENT_ID: ${FATSECRET_CLIENT_ID}
      FATSECRET_CLIENT_SECRET: ${FATSECRET_CLIENT_SECRET}
      USDA_API_KEY: ${USDA_API_KEY}
      WEB_PUSH_PUBLIC_KEY: ${WEB_PUSH_PUBLIC_KEY}
      WEB_PUSH_PRIVATE_KEY: ${WEB_PUSH_PRIVATE_KEY}
      WEB_PUSH_SUBJECT: ${WEB_PUSH_SUBJECT}
      GIT_COMMON_DIR: /workspaces/.git-common
      GIT_DIR: /workspaces/.git-dir
      GIT_WORK_TREE: /workspaces/${WORKSPACE_FOLDER_NAME}
      WORKTREE_COLOR: ${WORKTREE_COLOR}
      WORKTREE_IS_MAIN: ${WORKTREE_IS_MAIN}
      WORKTREE_NAME: ${WORKTREE_NAME}
      EXPO_WEB_DEV_SERVER_PORT: ${EXPO_WEB_PORT}
      EXPO_PUBLIC_CALIBRATE_SERVER_URL: http://localhost:${BACKEND_PORT}
      # Docker Desktop reports a WSL2 kernel, but the container cannot launch the host browser.
      BROWSER: none
    depends_on:
      postgres:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fitness_app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d fitness_app"]
      interval: 2s
      timeout: 5s
      retries: 60

volumes:
  postgres_data:
  workspace_node_modules:
    name: ${WORKSPACE_NODE_MODULES_VOLUME}
  backend_node_modules:
    name: ${BACKEND_NODE_MODULES_VOLUME}
  npm_cache:
    name: calibrate-health-npm-cache
