x-app: &app
  image: ${DEV_IMAGE_NAME}
  build:
    context: .
    dockerfile: Dockerfile.dev
  init: true
  networks:
    - app-network

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 60
    networks:
      - app-network

  backend:
    <<: *app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      PORT: "3000"
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME}
      SESSION_COOKIE_SECURE: "false"
      AUTO_LOGIN_TEST_USER: ${AUTO_LOGIN_TEST_USER:-true}
      NODE_ENV: development
      FOOD_DATA_PROVIDER: ${FOOD_DATA_PROVIDER}
      FATSECRET_CLIENT_ID: ${FATSECRET_CLIENT_ID}
      FATSECRET_CLIENT_SECRET: ${FATSECRET_CLIENT_SECRET}
      USDA_API_KEY: ${USDA_API_KEY}
      WEB_PUSH_PUBLIC_KEY: ${WEB_PUSH_PUBLIC_KEY}
      WEB_PUSH_PRIVATE_KEY: ${WEB_PUSH_PRIVATE_KEY}
      WEB_PUSH_SUBJECT: ${WEB_PUSH_SUBJECT}
      NATIVE_PUSH_MODE: ${NATIVE_PUSH_MODE}
      REMINDER_SEND_LOCAL_HOUR: ${REMINDER_SEND_LOCAL_HOUR}
      REMINDER_JOB_INTERVAL_MINUTES: ${REMINDER_JOB_INTERVAL_MINUTES}
      CALIBRATE_DIAGNOSTICS_ENABLED: ${CALIBRATE_DIAGNOSTICS_ENABLED}
      CALIBRATE_DIAGNOSTICS_METRICS_TOKEN: ${CALIBRATE_DIAGNOSTICS_METRICS_TOKEN}
      ALLOW_INSECURE_WEAR_PAIRING: ${ALLOW_INSECURE_WEAR_PAIRING}
    ports:
      - "127.0.0.1:${BACKEND_PORT}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: npm --prefix backend run dev
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /workspace/backend/src
        - action: sync
          path: ./shared
          target: /workspace/shared
        - action: rebuild
          path: ./backend/prisma
        - action: rebuild
          path: ./backend/package-lock.json
        - action: rebuild
          path: ./backend/package.json

  web:
    <<: *app
    environment:
      EXPO_PUBLIC_CALIBRATE_SERVER_URL: http://localhost:${BACKEND_PORT}
      EXPO_PUBLIC_CALIBRATE_AUTO_LOGIN_TEST_USER: ${EXPO_PUBLIC_CALIBRATE_AUTO_LOGIN_TEST_USER:-true}
      EXPO_PUBLIC_EAS_PROJECT_ID: ${EXPO_PUBLIC_EAS_PROJECT_ID}
      EXPO_UPDATES_CHANNEL: ${EXPO_UPDATES_CHANNEL}
      EXPO_WEB_DEV_SERVER_PORT: ${WEB_PORT}
      NODE_PATH: /workspace/mobile/node_modules:/workspace/node_modules
      BROWSER: none
      EXPO_UNSTABLE_HEADLESS: "1"
    ports:
      - "127.0.0.1:${WEB_PORT}:${WEB_PORT}"
    depends_on:
      - backend
    command: npm --prefix mobile run web -- --port ${WEB_PORT}
    develop:
      watch:
        - action: sync
          path: ./mobile
          target: /workspace/mobile
          ignore:
            - android/
            - node_modules/
            - dist/
            - .expo/
        - action: sync
          path: ./packages
          target: /workspace/packages
          ignore:
            - node_modules/
            - dist/
        - action: sync
          path: ./shared
          target: /workspace/shared
        - action: sync
          path: ./scripts/expo-cli-environment.mjs
          target: /workspace/scripts/expo-cli-environment.mjs
        - action: rebuild
          path: ./package-lock.json
        - action: rebuild
          path: ./package.json

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
