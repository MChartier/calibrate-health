name: Build Release Image

on:
  push:
    tags:
      # Match "vMAJOR.MINOR.PATCH" style tags (glob isn't strict; we validate in-workflow too).
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: calibratehealth
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/calibratehealth

jobs:
  build_and_push:
    name: Build and Push GHCR Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          # `HEAD` is always the checked-out commit, even when the workflow runs on an annotated tag.
          SOURCE_SHA="$(git rev-parse HEAD)"
          GHCR_IMAGE="${GHCR_IMAGE,,}"

          TAGS=()
          TAGS+=("${GHCR_IMAGE}:sha-${SOURCE_SHA}")

          if [[ "${GITHUB_REF}" == "refs/heads/master" ]]; then
            TAGS+=("${GHCR_IMAGE}:${GITHUB_REF_NAME}")
          fi

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              TAGS+=("${GHCR_IMAGE}:${GITHUB_REF_NAME}")
            else
              echo "Tag ${GITHUB_REF_NAME} is not a strict SemVer release tag; skipping version image tag."
            fi
          fi

          {
            echo "source_sha=${SOURCE_SHA}"
            echo "ghcr_image=${GHCR_IMAGE}"
            echo "tags<<EOF"
            printf "%s\n" "${TAGS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
