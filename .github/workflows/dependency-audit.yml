name: Dependency Audit

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '30 13 * * 1'

permissions:
  contents: read

concurrency:
  group: dependency-audit-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  production-audit:
    name: ${{ matrix.workspace }} Production Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: Root and Mobile
            directory: .
            lockfile: package-lock.json
            node: 22.13.0
          - workspace: Backend
            directory: backend
            lockfile: backend/package-lock.json
            node: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: ${{ matrix.lockfile }}

      - name: Install production dependency graph
        run: npm ci --omit=dev --no-audit --fund=false
        working-directory: ${{ matrix.directory }}

      - name: Audit high and critical production findings
        run: npm audit --omit=dev --audit-level=high
        working-directory: ${{ matrix.directory }}

      - name: Validate time-bounded dependency exceptions
        if: matrix.directory == '.'
        run: npm run audit:exceptions:check
