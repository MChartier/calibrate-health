name: Build GHCR on Master Merge

on:
  pull_request_target:
    types: [closed]
    branches: [master]

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-master-merge
  cancel-in-progress: false

env:
  IMAGE_NAME: calibratehealth

jobs:
  build_and_push:
    name: Build and Push GHCR Image
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          # Build exactly what landed in master after the merge.
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}"
          IMAGE="${IMAGE,,}"
          SOURCE_SHA="${{ github.event.pull_request.merge_commit_sha }}"
          if [[ -z "${SOURCE_SHA}" || "${SOURCE_SHA}" == "null" ]]; then
            SOURCE_SHA="${GITHUB_SHA}"
          fi

          {
            echo "source_sha=${SOURCE_SHA}"
            echo "tags<<EOF"
            echo "${IMAGE}:sha-${SOURCE_SHA}"
            echo "${IMAGE}:master"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
