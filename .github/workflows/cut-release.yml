name: Publish Manifest Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: publish-manifest-release
  cancel-in-progress: false

jobs:
  publish:
    name: Tag and Dispatch New Manifest Version
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Require master
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/master" ]]; then
            echo "This workflow publishes only from master; current ref is ${GITHUB_REF}." >&2
            exit 1
          fi

      - name: Checkout full release history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Plan manifest release
        id: version
        shell: bash
        run: |
          set -euo pipefail
          LATEST_TAG="$(git tag --list --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
          if [[ -n "${LATEST_TAG}" ]]; then
            node scripts/release-config.mjs plan --latest-tag "${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          else
            node scripts/release-config.mjs plan >> "$GITHUB_OUTPUT"
          fi

      - name: Validate container release
        if: steps.version.outputs.should_release == 'true'
        run: |
          npm run release:check:container
          npm run test:release
          npm run test:expo-web:release
          npm run test:deploy

      - name: Configure release tag identity
        if: steps.version.outputs.should_release == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push release tag
        if: steps.version.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          if git show-ref --tags --verify --quiet "refs/tags/${NEW_TAG}"; then
            echo "Tag ${NEW_TAG} already exists." >&2
            exit 1
          fi
          git tag -a "${NEW_TAG}" -m "Release ${NEW_TAG}" "${GITHUB_SHA}"
          git push origin "${NEW_TAG}"

      - name: Dispatch current release image workflow
        if: steps.version.outputs.should_release == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'container.yml',
              // Always load the current workflow; the immutable release tag is an explicit build input.
              ref: 'master',
              inputs: {
                release_tag: '${{ steps.version.outputs.new_tag }}',
              },
            });

      - name: Report no-op release check
        if: steps.version.outputs.should_release != 'true'
        run: echo "No release published because ${{ steps.version.outputs.new_tag }} is already the latest manifest release."
