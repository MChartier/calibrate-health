name: Cut Release Tag

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: cut-release-tag

jobs:
  cut_tag:
    name: Create and Push v* Tag
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate branch
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/master" ]]; then
            echo "This workflow must be run on the master branch (selected in the Actions UI)." >&2
            echo "Current ref: ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate canonical release configuration
        run: |
          npm run release:check:production
          npm run test:release
          npm run test:expo-web:release
          npm run test:deploy

      - name: Configure git identity (for annotated tags)
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read version tag from release manifest
        id: version
        shell: bash
        run: |
          set -euo pipefail
          LATEST_TAG="$(git tag --list --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
          if [[ -n "${LATEST_TAG}" ]]; then
            NEW_TAG="$(node scripts/release-config.mjs tag --latest-tag "${LATEST_TAG}")"
          else
            NEW_TAG="$(node scripts/release-config.mjs tag)"
          fi

          if git show-ref --tags --verify --quiet "refs/tags/${NEW_TAG}"; then
            echo "Tag ${NEW_TAG} already exists." >&2
            exit 1
          fi

          {
            echo "latest_tag=${LATEST_TAG}"
            echo "new_tag=${NEW_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail

          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          git tag -a "${NEW_TAG}" -m "Release ${NEW_TAG}" "${GITHUB_SHA}"
          git push origin "${NEW_TAG}"

      - name: Trigger release image build for new tag
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'container.yml',
              ref: '${{ steps.version.outputs.new_tag }}',
            });
