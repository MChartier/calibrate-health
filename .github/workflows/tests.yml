name: Tests

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: calibrate_ci
          POSTGRES_PASSWORD: calibrate_ci
          POSTGRES_DB: calibrate_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U calibrate_ci -d calibrate_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --fund=false

      - name: Verify fresh database migrations
        env:
          DATABASE_URL: postgresql://calibrate_ci:calibrate_ci@localhost:5432/calibrate_ci?schema=public
        run: npm run db:migrate

      - name: Run tests
        run: npm test

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --fund=false

      - name: Run tests
        run: npm test

  mobile-tests:
    name: Mobile Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install mobile deps
        run: npm ci --no-audit --fund=false

      - name: Install API generator deps
        run: npm ci --prefix backend --no-audit --fund=false

      - name: Validate API contract
        run: npm run api:contract:check

      - name: Run mobile tests
        run: npm --prefix mobile test
