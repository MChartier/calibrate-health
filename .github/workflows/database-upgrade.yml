name: Database Upgrade

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: database-upgrade-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  populated-upgrade:
    name: Populated Postgres Upgrade
    runs-on: ubuntu-latest
    timeout-minutes: 7
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: calibrate
          POSTGRES_PASSWORD: calibrate
          POSTGRES_DB: calibrate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U calibrate -d calibrate"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://calibrate:calibrate@localhost:5432/calibrate?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend ci --no-audit --fund=false

      - name: Validate upgrade-smoke helpers
        run: node --test scripts/postgres-populated-upgrade-smoke.test.mjs

      - name: Upgrade populated schema from 0020 through current
        run: node scripts/postgres-populated-upgrade-smoke.mjs
