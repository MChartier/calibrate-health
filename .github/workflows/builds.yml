name: Builds

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: builds-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  release-config:
    name: Release Configuration
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate versions and quality-gate tests
        run: |
          npm run release:check
          npm run test:release
          npm run test:native-release
          npm run test:wear:emulator:unit
          npm run test:deploy

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --fund=false

      - name: Build backend
        run: npm run build

  expo-web-build:
    name: Expo Web Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci --no-audit --fund=false

      - name: Build and validate Expo web
        run: |
          npm run build:expo-web
          npm run test:expo-web:release

  mobile-build:
    name: Mobile Build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install deps
        run: npm ci --no-audit --fund=false

      - name: Validate patched mobile build tools
        run: npm run test:mobile-build-tools

      - name: Type-check mobile
        run: npm --prefix mobile run typecheck

      - name: Prebuild Android
        working-directory: mobile
        run: npx expo prebuild --platform android --no-install

      - name: Build Android debug
        working-directory: mobile/android
        run: ./gradlew assembleDebug -PreactNativeArchitectures=x86_64

  wear-build:
    name: Wear Build and JVM Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create shared phone and Wear debug keystore
        shell: bash
        run: |
          mkdir -p mobile/android/app
          keytool -genkeypair -noprompt \
            -keystore mobile/android/app/debug.keystore \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Validate Wear source, resources, and tests
        working-directory: wear
        run: ./gradlew assembleDebug testDebugUnitTest --no-daemon --console=plain
