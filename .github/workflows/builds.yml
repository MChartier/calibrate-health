name: Builds

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: builds-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --fund=false

      - name: Build backend
        run: npm run build

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --fund=false

      - name: Build frontend
        run: npm run build

  mobile-build:
    name: Mobile Build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install deps
        run: npm ci --no-audit --fund=false

      - name: Type-check mobile
        run: npm --prefix mobile run typecheck

      - name: Prebuild Android
        working-directory: mobile
        run: npx expo prebuild --platform android --no-install

      - name: Build Android debug
        working-directory: mobile/android
        run: ./gradlew assembleDebug -PreactNativeArchitectures=x86_64
