      description: At most 500 combined upserts and deleted_record_ids are accepted per page.
      oneOf:
        - { $ref: '#/components/schemas/HealthConnectStepsSyncRequest' }
        - { $ref: '#/components/schemas/HealthConnectActiveCaloriesSyncRequest' }
        - { $ref: '#/components/schemas/HealthConnectTotalCaloriesSyncRequest' }
        - { $ref: '#/components/schemas/HealthConnectExerciseSyncRequest' }
        - { $ref: '#/components/schemas/HealthConnectWeightSyncRequest' }
    HealthConnectSyncEnvelope:
      type: object
      required: [sync_mode, previous_changes_token, next_changes_token]
      properties:
        sync_mode: { type: string, enum: [incremental, reset] }
        previous_changes_token: { type: [string, 'null'], maxLength: 32768 }
        next_changes_token: { type: string, minLength: 1, maxLength: 32768 }
        replace_window:
          $ref: '#/components/schemas/HealthConnectReplaceWindow'
          description: First reset page only; replaces this inclusive local-date window before applying the page.
        deleted_record_ids:
          type: array
          maxItems: 500
          items: { type: string, minLength: 1, maxLength: 512 }
        day_summaries:
          type: array
          maxItems: 366
          items: { $ref: '#/components/schemas/ActivityDaySummaryPayload' }
      allOf:
        - if:
            required: [sync_mode]
            properties: { sync_mode: { const: reset } }
          then:
            properties: { previous_changes_token: { type: 'null' } }
          else:
            not: { required: [replace_window] }
