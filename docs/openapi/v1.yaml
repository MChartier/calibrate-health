openapi: 3.1.0
info:
  title: Calibrate API
  version: 1.0.0
  description: Stable wire contract shared by the self-hosted web, Android, and future Wear OS clients.
servers:
  - url: /
paths:
  /api/v1/client-config:
    get:
      operationId: getClientConfig
      security: []
      responses:
        '200':
          description: Server compatibility and capability document.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientConfigResponse'
  /auth/mobile/login:
    post:
      operationId: loginMobile
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileAuthRequest'
      responses:
        '200':
          description: Authenticated native session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileAuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/mobile/register:
    post:
      operationId: registerMobile
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileAuthRequest'
      responses:
        '200':
          description: Registered Android phone session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileAuthResponse'
        '400':
          description: Invalid registration or Android phone device metadata.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
  /auth/mobile/refresh:
    post:
      operationId: refreshMobile
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Rotated native session credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileRefreshResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/mobile/sessions:
    get:
      operationId: listMobileSessions
      responses:
        '200':
          description: Active native sessions owned by the account.
          content:
            application/json:
              schema:
                type: object
                required: [sessions]
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: '#/components/schemas/MobileSessionSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/mobile/wear/pairing-credential:
    post:
      operationId: issueWearPairingCredential
      description: Issue a short-lived one-time credential from the current Android phone session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WearPairingCredentialRequest'
      responses:
        '201':
          description: Credential and exact self-hosted server origin to transfer to the paired watch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WearPairingCredentialResponse'
        '400':
          description: Invalid server origin, watch identity, protocol, or public key.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Caller is not an active Android phone session.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
  /auth/mobile/wear/pair:
    post:
      operationId: exchangeWearPairingCredential
      security: []
      description: Consume a server-bound one-time credential and create a revocable Wear OS session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WearPairingExchangeRequest'
      responses:
        '200':
          description: Authenticated Wear OS session credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WearMobileAuthResponse'
        '400':
          description: Invalid exchange payload.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
        '401':
          description: Credential or challenge signature is invalid, or the issuing phone session is inactive.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
        '409':
          description: Credential was already used, its binding differs, or a same-exchange UUID retry within the credential TTL revoked the orphaned session and requires fresh pairing.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
        '410':
          description: Credential expired.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
  /api/v1/watch:
    get:
      operationId: getWatchSnapshot
      description: Return one bounded account-local snapshot for the authenticated Wear OS session.
      responses:
        '200':
          description: Current watch snapshot. The weak ETag tracks semantic snapshot revisions.
          headers:
            ETag:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WatchSnapshot' }
        '304':
          description: Snapshot semantics are unchanged for the supplied If-None-Match value.
        '403':
          description: Caller is not an authenticated Wear OS session.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
        '404':
          description: Account no longer exists.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
        '500':
          description: Snapshot generation failed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
  /api/v1/watch/mutations:
    post:
      operationId: executeWatchMutation
      description: Execute and exactly replay one restricted Wear mutation.
      parameters:
        - in: header
          name: x-client-operation-id
          required: true
          schema: { type: string, minLength: 8, maxLength: 128 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WatchMutationRequest' }
      responses:
        '200':
          description: Mutation result or exact replay of its committed result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WatchMutationResponse' }
        '400':
          description: Invalid operation ID or mutation payload.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
        '403':
          description: Caller is not an authenticated Wear OS session.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
        '409':
          description: Operation conflict or current-session undo restriction.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
        '404':
          description: Referenced My Food or entity no longer exists.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
        '500':
          description: Mutation execution failed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
  /api/v1/food/{foodLogId}:
    delete:
      operationId: deleteFoodLog
      parameters:
        - $ref: '#/components/parameters/FoodLogId'
        - $ref: '#/components/parameters/ClientOperationId'
      responses:
        '204':
          description: Food log deleted; response has no body.
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/metrics/{metricId}:
    delete:
      operationId: deleteMetric
      parameters:
        - $ref: '#/components/parameters/MetricId'
        - $ref: '#/components/parameters/ClientOperationId'
      responses:
        '204':
          description: Weight metric deleted; response has no body.
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/sync/changes:
    get:
      operationId: getSyncChanges
      parameters:
        - name: after
          in: query
          schema:
            type: string
            pattern: '^\d+$'
            default: '0'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 200
      responses:
        '200':
          description: Ordered account changes after the supplied cursor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncChangesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/activity/days:
    get:
      operationId: getActivityDays
      parameters:
        - name: start
          in: query
          schema: { type: string, format: date }
        - name: end
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Observational Health Connect summaries and provenance records grouped by account-local day.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityDaysResponse'
        '400':
          description: Invalid or excessive local-date range.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/activity/health-connect/sync:
    post:
      operationId: syncHealthConnect
      description: Atomically reconcile one record-type change page and advance its trusted mobile-device checkpoint.
      parameters:
        - name: x-client-operation-id
          in: header
          required: true
          description: Stable client-generated identifier used to safely replay this sync page.
          schema:
            type: string
            minLength: 8
            maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HealthConnectSyncRequest'
      responses:
        '200':
          description: Source changes, summaries, and next checkpoint committed together.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthConnectSyncResponse'
        '400':
          description: Invalid Health Connect change page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: A bearer-authenticated Android installation is required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Operation-id or Health Connect checkpoint conflict.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/user/account/export:
    get:
      operationId: exportAccount
      responses:
        '200':
          description: Canonical versioned export of user-authored account and tracking data.
          headers:
            Content-Disposition:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountExport'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/user/account:
    delete:
      operationId: deleteAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password]
              properties:
                current_password:
                  type: string
                  minLength: 1
      responses:
        '204':
          description: Account, sessions, and all user-owned data were deleted.
        '400':
          description: Current password is missing or incorrect.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    mobileBearer:
      type: http
      scheme: bearer
  parameters:
    FoodLogId:
      name: foodLogId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    MetricId:
      name: metricId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ClientOperationId:
      name: x-client-operation-id
      in: header
      required: false
      description: Stable client-generated identifier used to safely replay a mutation.
      schema:
        type: string
        minLength: 8
        maxLength: 128
  responses:
    Unauthorized:
      description: Authentication is missing, expired, or rejected.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
  schemas:
    AccountExport:
      type: object
      additionalProperties: false
      required: [format, version, exported_at, account, goals, body_metrics, food_logs, food_log_days, my_foods, in_app_notifications, activity_records, activity_day_summaries]
      properties:
        format:
          type: string
          const: calibrate-account-export
        version:
          type: integer
          const: 2
        exported_at:
          type: string
          format: date-time
        account:
          $ref: '#/components/schemas/AccountExportProfile'
        goals:
          type: array
          items:
            $ref: '#/components/schemas/AccountExportGoal'
        body_metrics:
          type: array
          items:
            $ref: '#/components/schemas/AccountExportBodyMetric'
        food_logs:
          type: array
          items:
            $ref: '#/components/schemas/AccountExportFoodLog'
        food_log_days:
          type: array
          items:
            $ref: '#/components/schemas/AccountExportFoodLogDay'
        my_foods:
          type: array
          items:
            $ref: '#/components/schemas/AccountExportMyFood'
        in_app_notifications:
          type: array
          items:
            $ref: '#/components/schemas/AccountExportNotification'
        activity_records:
          type: array
          items:
            $ref: '#/components/schemas/AccountExportActivityRecord'
        activity_day_summaries:
          type: array
          items:
            $ref: '#/components/schemas/AccountExportActivityDaySummary'
    AccountExportProfile:
      type: object
      required: [id, email, created_at, weight_unit, height_unit, timezone, language, reminder_log_weight_enabled, reminder_log_food_enabled, haptics_enabled, date_of_birth, sex, height_mm, activity_level, profile_image]
      properties:
        id: { type: integer }
        email: { type: string, format: email }
        created_at: { type: string, format: date-time }
        weight_unit: { type: string, enum: [KG, LB] }
        height_unit: { type: string, enum: [CM, FT_IN] }
        timezone: { type: string }
        language: { type: string }
        reminder_log_weight_enabled: { type: boolean }
        reminder_log_food_enabled: { type: boolean }
        haptics_enabled: { type: boolean }
        date_of_birth: { type: [string, 'null'], format: date }
        sex: { type: [string, 'null'], enum: [MALE, FEMALE, null] }
        height_mm: { type: [integer, 'null'] }
        activity_level: { type: [string, 'null'], enum: [SEDENTARY, LIGHT, MODERATE, ACTIVE, VERY_ACTIVE, null] }
        profile_image:
          type: [object, 'null']
          required: [mime_type, data_base64]
          properties:
            mime_type: { type: string }
            data_base64: { type: string, contentEncoding: base64 }
    AccountExportGoal:
      type: object
      required: [id, start_weight_grams, target_weight_grams, target_date, daily_deficit, created_at]
      properties:
        id: { type: integer }
        start_weight_grams: { type: integer }
        target_weight_grams: { type: integer }
        target_date: { type: [string, 'null'], format: date-time }
        daily_deficit: { type: integer }
        created_at: { type: string, format: date-time }
    AccountExportBodyMetric:
      type: object
      required: [id, date, weight_grams, body_fat_percent]
      properties:
        id: { type: integer }
        date: { type: string, format: date }
        weight_grams: { type: integer }
        body_fat_percent: { type: [number, 'null'] }
    AccountExportFoodLog:
      type: object
      required: [id, my_food_id, date, local_date, meal_period, name, calories, servings_consumed, serving_size_quantity_snapshot, serving_unit_label_snapshot, calories_per_serving_snapshot, external_source, external_id, brand_snapshot, locale_snapshot, barcode_snapshot, measure_label_snapshot, grams_per_measure_snapshot, measure_quantity_snapshot, grams_total_snapshot, created_at]
      properties:
        id: { type: integer }
        my_food_id: { type: [integer, 'null'] }
        date: { type: string, format: date-time }
        local_date: { type: string, format: date }
        meal_period: { type: string, enum: [BREAKFAST, MORNING_SNACK, LUNCH, AFTERNOON_SNACK, DINNER, EVENING_SNACK] }
        name: { type: string }
        calories: { type: integer }
        servings_consumed: { type: [number, 'null'] }
        serving_size_quantity_snapshot: { type: [number, 'null'] }
        serving_unit_label_snapshot: { type: [string, 'null'] }
        calories_per_serving_snapshot: { type: [number, 'null'] }
        external_source: { type: [string, 'null'] }
        external_id: { type: [string, 'null'] }
        brand_snapshot: { type: [string, 'null'] }
        locale_snapshot: { type: [string, 'null'] }
        barcode_snapshot: { type: [string, 'null'] }
        measure_label_snapshot: { type: [string, 'null'] }
        grams_per_measure_snapshot: { type: [number, 'null'] }
        measure_quantity_snapshot: { type: [number, 'null'] }
        grams_total_snapshot: { type: [number, 'null'] }
        created_at: { type: string, format: date-time }
    AccountExportFoodLogDay:
      type: object
      required: [id, local_date, is_complete, completed_at, created_at, updated_at]
      properties:
        id: { type: integer }
        local_date: { type: string, format: date }
        is_complete: { type: boolean }
        completed_at: { type: [string, 'null'], format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AccountExportRecipeIngredient:
      type: object
      required: [id, sort_order, source, name_snapshot, calories_total_snapshot, source_my_food_id, quantity_servings, serving_size_quantity_snapshot, serving_unit_label_snapshot, calories_per_serving_snapshot, external_source, external_id, brand_snapshot, locale_snapshot, barcode_snapshot, measure_label_snapshot, grams_per_measure_snapshot, measure_quantity_snapshot, grams_total_snapshot, created_at]
      properties:
        id: { type: integer }
        sort_order: { type: integer }
        source: { type: string, enum: [MY_FOOD, EXTERNAL] }
        name_snapshot: { type: string }
        calories_total_snapshot: { type: number }
        source_my_food_id: { type: [integer, 'null'] }
        quantity_servings: { type: [number, 'null'] }
        serving_size_quantity_snapshot: { type: [number, 'null'] }
        serving_unit_label_snapshot: { type: [string, 'null'] }
        calories_per_serving_snapshot: { type: [number, 'null'] }
        external_source: { type: [string, 'null'] }
        external_id: { type: [string, 'null'] }
        brand_snapshot: { type: [string, 'null'] }
        locale_snapshot: { type: [string, 'null'] }
        barcode_snapshot: { type: [string, 'null'] }
        measure_label_snapshot: { type: [string, 'null'] }
        grams_per_measure_snapshot: { type: [number, 'null'] }
        measure_quantity_snapshot: { type: [number, 'null'] }
        grams_total_snapshot: { type: [number, 'null'] }
        created_at: { type: string, format: date-time }
    AccountExportMyFood:
      type: object
      required: [id, type, name, serving_size_quantity, serving_unit_label, calories_per_serving, is_pinned, recipe_total_calories, yield_servings, created_at, updated_at, recipe_ingredients]
      properties:
        id: { type: integer }
        type: { type: string, enum: [FOOD, RECIPE] }
        name: { type: string }
        serving_size_quantity: { type: number }
        serving_unit_label: { type: string }
        calories_per_serving: { type: number }
        is_pinned: { type: boolean }
        recipe_total_calories: { type: [number, 'null'] }
        yield_servings: { type: [number, 'null'] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        recipe_ingredients:
          type: array
          items:
            $ref: '#/components/schemas/AccountExportRecipeIngredient'
    AccountExportNotification:
      type: object
      required: [id, type, local_date, title, body, action_url, read_at, dismissed_at, resolved_at, created_at, updated_at]
      properties:
        id: { type: integer }
        type: { type: string, enum: [LOG_WEIGHT_REMINDER, LOG_FOOD_REMINDER, GENERIC] }
        local_date: { type: string, format: date }
        title: { type: [string, 'null'] }
        body: { type: [string, 'null'] }
        action_url: { type: [string, 'null'] }
        read_at: { type: [string, 'null'], format: date-time }
        dismissed_at: { type: [string, 'null'], format: date-time }
        resolved_at: { type: [string, 'null'], format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AccountExportActivityRecord:
      type: object
      description: User-visible Health Connect provenance; private source-device identifiers are omitted.
      required: [id, record_type, external_id, data_origin, client_record_id, client_record_version, source_updated_at, start_time, end_time, start_zone_offset_seconds, end_zone_offset_seconds, local_date, step_count, energy_kcal, weight_grams, exercise_type, title, notes, recording_method, device_type, device_manufacturer, device_model, created_at, updated_at]
      properties:
        id: { type: integer }
        record_type: { $ref: '#/components/schemas/ActivityRecordType' }
        external_id: { type: string }
        data_origin: { type: string }
        client_record_id: { type: [string, 'null'] }
        client_record_version: { type: [string, 'null'], pattern: '^\d+$' }
        source_updated_at: { type: string, format: date-time }
        start_time: { type: string, format: date-time }
        end_time: { type: [string, 'null'], format: date-time }
        start_zone_offset_seconds: { type: [integer, 'null'] }
        end_zone_offset_seconds: { type: [integer, 'null'] }
        local_date: { type: string, format: date }
        step_count: { type: [integer, 'null'], minimum: 0 }
        energy_kcal: { type: [number, 'null'], minimum: 0 }
        weight_grams: { type: [integer, 'null'], minimum: 1 }
        exercise_type: { type: [integer, 'null'], minimum: 0 }
        title: { type: [string, 'null'] }
        notes: { type: [string, 'null'] }
        recording_method: { type: [integer, 'null'], minimum: 0 }
        device_type: { type: [integer, 'null'], minimum: 0 }
        device_manufacturer: { type: [string, 'null'] }
        device_model: { type: [string, 'null'] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AccountExportActivityDaySummary:
      type: object
      required: [id, local_date, steps, active_calories_kcal, total_calories_kcal, exercise_minutes, observed_at, created_at, updated_at]
      properties:
        id: { type: integer }
        local_date: { type: string, format: date }
        steps: { type: [integer, 'null'], minimum: 0 }
        active_calories_kcal: { type: [number, 'null'], minimum: 0 }
        total_calories_kcal: { type: [number, 'null'], minimum: 0 }
        exercise_minutes: { type: [number, 'null'], minimum: 0 }
        observed_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ActivityRecordType:
      type: string
      enum: [STEPS, ACTIVE_CALORIES, TOTAL_CALORIES, EXERCISE_SESSION, WEIGHT]
    HealthConnectRecordBase:
      type: object
      required: [record_id, data_origin, source_updated_at, start_time]
      properties:
        record_id: { type: string, minLength: 1, maxLength: 512 }
        data_origin: { type: string, minLength: 1, maxLength: 255 }
        client_record_id: { type: [string, 'null'], maxLength: 512 }
        client_record_version: { type: [string, 'null'], pattern: '^\d+$' }
        source_updated_at: { type: string, format: date-time }
        start_time: { type: string, format: date-time }
        end_time: { type: [string, 'null'], format: date-time }
        start_zone_offset_seconds: { type: [integer, 'null'], minimum: -64800, maximum: 64800 }
        end_zone_offset_seconds: { type: [integer, 'null'], minimum: -64800, maximum: 64800 }
        title: { type: [string, 'null'], maxLength: 500 }
        notes: { type: [string, 'null'], maxLength: 2000 }
        recording_method: { type: [integer, 'null'], minimum: 0 }
        device_type: { type: [integer, 'null'], minimum: 0 }
        device_manufacturer: { type: [string, 'null'], maxLength: 255 }
        device_model: { type: [string, 'null'], maxLength: 255 }
    HealthConnectStepUpsert:
      allOf:
        - { $ref: '#/components/schemas/HealthConnectRecordBase' }
        - type: object
          required: [count]
          properties:
            count: { type: integer, minimum: 1 }
    HealthConnectEnergyUpsert:
      allOf:
        - { $ref: '#/components/schemas/HealthConnectRecordBase' }
        - type: object
          required: [energy_kcal]
          properties:
